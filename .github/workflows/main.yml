name: Build Python APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            openjdk-11-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libltdl-dev \
            ccache
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython pyjnius
      
      - name: Build APK with Buildozer
        working-directory: ./lp
        env:
          USE_PREBUILT_RECIPES: 1
          BUILDOZER_NO_DEPS: 1
        run: |
          buildozer android release
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-learning-app
          path: lp/bin/*.apk
